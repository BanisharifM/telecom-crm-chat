name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt pytest pytest-cov ruff

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: PYTHONPATH=src pytest tests/ -v --tb=short
        env:
          OPENROUTER_API_KEY: "test-key-not-used"

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t telecom-crm-chat:${{ github.sha }} .
